<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Habit Coach</title>
<!-- Google Fonts Outfit -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Outfit', sans-serif;
}

body {
  background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
  color: #f8fafc;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.container {
  background: rgba(30, 41, 59, 0.7);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  width: 100%;
  max-width: 650px;
  padding: 40px;
  border-radius: 20px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
}

h1 {
  text-align: center;
  font-size: 2.2rem;
  font-weight: 700;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #a855f7, #6366f1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.tagline {
  text-align: center;
  color: #94a3b8;
  font-size: 1rem;
  margin-bottom: 30px;
  font-weight: 300;
}

.input-group {
  margin-bottom: 25px;
  position: relative;
}

label {
  font-weight: 600;
  font-size: 0.9rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: #cbd5e1;
  display: block;
  margin-bottom: 10px;
}

input {
  width: 100%;
  padding: 16px 80px 16px 16px;
  font-size: 1rem;
  background: rgba(15, 23, 42, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 12px;
  color: #f8fafc;
  outline: none;
  transition: all 0.3s ease;
}

input:focus {
  border-color: #6366f1;
  box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
  background: rgba(15, 23, 42, 0.8);
}

input::placeholder {
  color: #64748b;
}

button.ask-btn {
  width: 100%;
  padding: 16px;
  font-size: 1.1rem;
  font-weight: 600;
  border: none;
  background: linear-gradient(135deg, #6366f1, #a855f7);
  color: white;
  border-radius: 12px;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
  transition: all 0.3s ease;
}

button.ask-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
}

button.ask-btn:active:not(:disabled) {
  transform: translateY(1px);
}

button.ask-btn:disabled {
  background: #334155;
  color: #64748b;
  cursor: not-allowed;
  box-shadow: none;
}

#loading {
  display: none;
  text-align: center;
  margin-top: 30px;
  font-size: 1.1rem;
  font-weight: 500;
  color: #6366f1;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid rgba(99, 102, 241, 0.1);
  border-top-color: #6366f1;
  border-radius: 50%;
  margin: 0 auto 15px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

#result {
  margin-top: 35px;
  display: none;
  grid-template-columns: 1fr;
  gap: 20px;
  animation: fadeIn 0.6s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

.card {
  position: relative;
  background: rgba(15, 23, 42, 0.5);
  border: 1px solid rgba(255, 255, 255, 0.05);
  border-radius: 16px;
  padding: 20px;
  transition: all 0.3s ease;
  overflow: hidden;
}

.card:hover {
  transform: translateY(-3px);
  border-color: rgba(255, 255, 255, 0.1);
}

.motivation-card {
  border-left: 4px solid #f59e0b;
}

.tip-card {
  border-left: 4px solid #06b6d4;
}

.challenge-card {
  border-left: 4px solid #d946ef;
}

.card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}

.card-icon {
  font-size: 1.4rem;
}

.card h3 {
  font-size: 1.1rem;
  font-weight: 600;
  color: #f1f5f9;
}

.card-text {
  font-size: 0.95rem;
  color: #cbd5e1;
  line-height: 1.6;
}

.complete-btn {
  margin-top: 15px;
  padding: 10px 20px;
  background: linear-gradient(135deg, #d946ef, #8b5cf6);
  border: none;
  border-radius: 8px;
  color: white;
  font-weight: 600;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.3s ease;
  width: 100%;
}

.complete-btn:hover:not(:disabled) {
  box-shadow: 0 4px 12px rgba(217, 70, 239, 0.4);
  transform: scale(1.02);
}

.complete-btn.completed {
  background: #10b981;
  cursor: default;
  box-shadow: none;
}

.card-completed {
  background: rgba(16, 185, 129, 0.05);
  border-color: rgba(16, 185, 129, 0.2);
}

.confetti-particle {
  position: absolute;
  top: 50%;
  left: 50%;
  border-radius: 50%;
  pointer-events: none;
  animation: fly-out 1s ease-out forwards;
  z-index: 10;
}

@keyframes fly-out {
  0% {
    transform: translate(-50%, -50%) scale(1) rotate(0deg);
    opacity: 1;
  }
  100% {
    transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(0) rotate(360deg);
    opacity: 0;
  }
}

.error-msg {
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid rgba(239, 68, 68, 0.2);
  border-radius: 12px;
  padding: 15px;
  color: #f87171;
  text-align: center;
  font-weight: 500;
}

footer {
  margin-top: 35px;
  text-align: center;
  font-size: 0.85rem;
  color: #64748b;
  font-weight: 300;
}

footer a {
  color: #6366f1;
  text-decoration: none;
}

.char-count {
  position: absolute;
  right: 15px;
  bottom: 18px;
  font-size: 0.8rem;
  color: #64748b;
  pointer-events: none;
  transition: color 0.2s ease;
}
</style>

</head>

<body>

<div class="container">

  <h1>🤖 AI Habit Coach</h1>
  <p class="tagline">Build better habits with personalized AI guidance.</p>

  <div class="input-group">
    <label for="habit">Enter a habit you want to build</label>
    <input
      type="text"
      id="habit"
      maxlength="100"
      placeholder="Example: Exercise for 30 minutes every day">
    <div id="charCount" class="char-count">0 / 100</div>
  </div>

  <button id="askBtn" class="ask-btn">
    Get AI Advice
  </button>

  <div id="loading">
    <div class="spinner"></div>
    Generating advice...
  </div>

  <div id="result"></div>

  <footer>
    Powered by OpenAI & Vercel
  </footer>

</div>

<script>
const button = document.getElementById("askBtn");
const result = document.getElementById("result");
const loading = document.getElementById("loading");
const habitInput = document.getElementById("habit");
const charCount = document.getElementById("charCount");

habitInput.addEventListener("input", () => {
  const currentLength = habitInput.value.length;
  charCount.textContent = `${currentLength} / 100`;
  if (currentLength >= 90) {
    charCount.style.color = "#ef4444";
  } else {
    charCount.style.color = "#64748b";
  }
});

button.addEventListener("click", askAI);

async function askAI() {
  const habit = habitInput.value.trim();

  if (habit === "") {
    alert("Please enter a habit.");
    return;
  }

  loading.style.display = "block";
  result.style.display = "none";
  button.disabled = true;

  try {
    const response = await fetch("/api/script", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ habit })
    });

    const data = await response.json();
    loading.style.display = "none";
    button.disabled = false;

    if (response.status === 400 || !data.success) {
      result.style.display = "block";
      result.innerHTML = `<div class="error-msg">❌ ${data.error || "Bad request."}</div>`;
      return;
    }

    let advice;
    try {
      advice = JSON.parse(data.reply);
    } catch (err) {
      advice = {
        isHabit: true,
        motivation: "Stay dedicated to your goal and remember why you started.",
        tip: "Focus on making the first step as small as possible.",
        challenge: "Execute the smallest chunk of this habit today!"
      };
    }

    if (advice.isHabit === false) {
      result.style.display = "block";
      result.innerHTML = `
        <div class="error-msg">
          <span style="font-size: 1.5rem; display: block; margin-bottom: 8px;">🛡️ AI Coach Guardrail</span>
          ${advice.error || "This input doesn't seem to be a valid habit. Please try something else."}
        </div>
      `;
    } else {
      result.style.display = "grid";
      result.innerHTML = `
        <div class="card motivation-card">
          <div class="card-header">
            <span class="card-icon">🌟</span>
            <h3>Personal Motivation</h3>
          </div>
          <p class="card-text">${advice.motivation || ''}</p>
        </div>

        <div class="card tip-card">
          <div class="card-header">
            <span class="card-icon">💡</span>
            <h3>Daily Coaching Tip</h3>
          </div>
          <p class="card-text">${advice.tip || ''}</p>
        </div>

        <div class="card challenge-card" id="challengeCard">
          <div class="card-header">
            <span class="card-icon">🎯</span>
            <h3>Today's Challenge</h3>
          </div>
          <p class="card-text">${advice.challenge || ''}</p>
          <button class="complete-btn" id="completeBtn" onclick="completeChallenge()">
            Complete Challenge
          </button>
        </div>
      `;
    }
  } catch (error) {
    loading.style.display = "none";
    button.disabled = false;
    result.style.display = "block";
    result.innerHTML = `<div class="error-msg">❌ Something went wrong. Please try again.</div>`;
  }
}

function completeChallenge() {
  const btn = document.getElementById("completeBtn");
  const card = document.getElementById("challengeCard");
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = "🎉 Challenge Completed!";
    btn.classList.add("completed");
    card.classList.add("card-completed");
    triggerConfetti();
  }
}

function triggerConfetti() {
  const container = document.getElementById("challengeCard");
  for (let i = 0; i < 30; i++) {
    const particle = document.createElement("div");
    particle.className = "confetti-particle";
    
    const x = Math.random() * 140 - 70; // spread horizontal
    const y = Math.random() * -100 - 40; // shoot up
    const size = Math.random() * 6 + 6;
    const colors = ['#6366f1', '#a855f7', '#3b82f6', '#10b981', '#f59e0b', '#ef4444'];
    const color = colors[Math.floor(Math.random() * colors.length)];
    
    particle.style.width = `${size}px`;
    particle.style.height = `${size}px`;
    particle.style.backgroundColor = color;
    particle.style.setProperty('--x', `${x}px`);
    particle.style.setProperty('--y', `${y}px`);
    
    container.appendChild(particle);
    
    setTimeout(() => {
      particle.remove();
    }, 1000);
  }
}
</script>

</body>
</html>
